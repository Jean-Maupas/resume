# Jean M. Maupas — Resume
# Schema: JSON Resume v1.0.0 (jsonresume.org/schema) + maupas-cv-extensions v1
#
# Extensions over JSON Resume:
#   meta.profiles[]          — named job-profile definitions with display label
#   basics.summaries[]       — per-profile summary text, replaces basics.summary
#   work[].url               — company website (not in base schema)
#   work[].highlights[]      — changed from string[] to {text, tags[]}
#   skills[].tags[]          — which job profiles this skill group belongs to
#   education[].url          — institution website
#
# Profile identifiers (tags):
#   clinical_research        — Clinical data management, biometrics, submissions
#   data_science             — Statistical programming, R/Python, visualisation
#   software_engineering     — SDLC, APIs, system development, coding
#   information_systems      — IS architecture, EDC/CTMS integration, business analysis

meta:
  schemaVersion: "jsonresume-maupas-v1"
  lastUpdated: "2025-04"
  profiles:
