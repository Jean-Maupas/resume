        30 peer-reviewed articles and conference presentations, cited 393 times.

    - tags: [data_science]
      text: >
        Clinical research, data science, clinical and statistical programming,
        data management, reporting, visualisation and analysis in senior and managerial
        positions, for device and pharmaceutical companies, CROs, and academic centres.
        Overall comprehensive understanding of the clinical research process from protocol
        to submission and publication. Deep knowledge of ICH, 21 CFR Part 11,
        EUdract Annex 11, ADaM, SDTM, and CDASH CDISC standards.
        SDTM certification passed January 2021.
        30 peer-reviewed articles and conference presentations, cited 393 times.

    - tags: [software_engineering, information_systems]
      text: >
        Business analysis, data and systems engineering, data science, clinical and
        statistical programming, data management, reporting, visualisation and analysis
        in senior and managerial positions, for device and pharmaceutical companies,
        CROs, and academic centres.
        Deep knowledge of ICH, 21 CFR Part 11, EUdract Annex 11, ADaM, SDTM, and
        CDASH CDISC standards. SDTM certification passed January 2021.

