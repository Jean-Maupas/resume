        Specialist in Clinical Data Management, data science, data analysis and
        visualisation, in senior and managerial positions, for various organisations
        including device and pharmaceutical companies, CROs, and academic centres.
        Overall comprehensive understanding of the clinical research process from
        protocol to submission and publication. Deep knowledge of ICH, 21 CFR Part 11,
